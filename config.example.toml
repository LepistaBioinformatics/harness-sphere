# HarnessSphere — example config (sprint 1).
# Usage: ./harnesssphere config.example.toml
# Override the exporter via env: HARNESSSPHERE_EXPORTER=stdout

host_interval_secs = 5     # host collection interval (Critical)
self_interval_secs = 10    # self-observability interval (Critical)
critical_threshold = 3     # consecutive failures of a Critical before exiting (exit != 0)
exporter = "otlp"        # "stdout" or "otlp" (the latter needs the `otlp` feature)

# OTLP exporter (when exporter = "otlp"; build with --features otlp)
otlp_endpoint = "http://localhost:4317"
service_name = "harnesssphere"
metric_export_interval_secs = 15

# Local OTLP ingest receiver (build with --features ingest)
ingest_enabled = false           # accept OTLP that OpenClaw/Hermes push to us
ingest_endpoint = "0.0.0.0:4318" # gRPC bind address for the receiver

# Optional, harness-independent: observe co-located processes that don't export their own
# telemetry (e.g. the PicoClaw gateway). Emits process.* tagged with process.executable.name.
watch_processes = []             # e.g. ["picoclaw"]
# TCP liveness + latency probes of local endpoints -> harnesssphere.endpoint.{up,probe.duration}
probe_targets = []               # e.g. ["localhost:18790"]  (the PicoClaw gateway)

# Derive AI activity from a harness's on-disk session files (the ClawMetry approach).
# Emits harnesssphere.harness.messages (by role), tool.calls, harness.sessions.
# NOTE: tokens are NOT derivable — PicoClaw doesn't write token cost to disk.
session_dir = ""                 # e.g. "~/.picoclaw/workspace/sessions"
session_source = "picoclaw"      # harness.name label on the emitted metrics

# Read a container's cgroup v2 directly (no Docker socket) -> container.* metrics.
container_cgroup = ""            # e.g. "/sys/fs/cgroup/system.slice/docker-<id>.scope"
container_id = ""               # container.id label (empty -> derived from the cgroup dir name)

# Scrape a Prometheus exposition endpoint (e.g. OpenClaw's diagnostics-prometheus plugin).
# GenAI metrics map to gen_ai.* semconv; the rest to harnesssphere.openclaw.*.
prometheus_scrape_url = ""       # e.g. "http://127.0.0.1:18789/api/diagnostics/prometheus"
# The endpoint is auth-protected. Point this at a file holding the gateway token, or set the
# env var HARNESSSPHERE_PROMETHEUS_TOKEN (it overrides the file). Never inline the token here.
prometheus_token_file = ""       # e.g. "/etc/harnesssphere/openclaw-gateway-token"
prometheus_harness_name = "openclaw"  # harness.name label on the scraped metrics
prometheus_interval_secs = 15    # scrape cadence (a network scrape, slower than host metrics)
