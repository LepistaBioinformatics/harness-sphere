name: Release

# Triggered when a release PR (a `release/*` branch opened by "Prepare release PR") is
# merged into main. Tags the version, cross-builds the portable binaries for every
# supported target, and publishes a GitHub Release with the artifacts — so the binary is
# downloadable before any crates.io publish.
on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    name: Tag release
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Read version and create tag
        id: v
        run: |
          VERSION="$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name=="harnesssphere") | .version')"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v$VERSION"
          git push origin "v$VERSION"

  build:
    name: Build ${{ matrix.target }}
    needs: tag
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-musl,      os: ubuntu-latest, cross: true }
          - { target: aarch64-unknown-linux-musl,     os: ubuntu-latest, cross: true }
          - { target: armv7-unknown-linux-musleabihf, os: ubuntu-latest, cross: true }
          - { target: x86_64-apple-darwin,            os: macos-latest,  cross: false }
          - { target: aarch64-apple-darwin,           os: macos-latest,  cross: false }
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "v${{ needs.tag.outputs.version }}"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: Build release binary (otlp + ingest)
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --locked --target "${{ matrix.target }}" \
              -p harnesssphere --features otlp,ingest
          else
            cargo build --release --locked --target "${{ matrix.target }}" \
              -p harnesssphere --features otlp,ingest
          fi
      - name: Package
        shell: bash
        run: |
          DIR="target/${{ matrix.target }}/release"
          TAR="harnesssphere-v${{ needs.tag.outputs.version }}-${{ matrix.target }}.tar.gz"
          tar -czf "$TAR" -C "$DIR" harnesssphere
          (sha256sum "$TAR" || shasum -a 256 "$TAR") > "$TAR.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: harnesssphere-${{ matrix.target }}
          path: |
            harnesssphere-*.tar.gz
            harnesssphere-*.tar.gz.sha256

  release:
    name: GitHub Release
    needs: [tag, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.tag.outputs.version }}"
          name: "v${{ needs.tag.outputs.version }}"
          generate_release_notes: true
          files: |
            dist/harnesssphere-*.tar.gz
            dist/harnesssphere-*.tar.gz.sha256
