# HarnessSphere — config de exemplo (sprint 1).
# Uso: ./harnesssphere config.example.toml
# Override de exporter por env: HARNESSSPHERE_EXPORTER=stdout

host_interval_secs = 5     # intervalo de coleta do host (Critical)
self_interval_secs = 10    # intervalo de auto-observabilidade (Critical)
critical_threshold = 3     # falhas consecutivas de um Critical antes de encerrar (exit != 0)
exporter = "stdout"        # "stdout" (sprint 1). "otlp" chega via feature `otlp`.
