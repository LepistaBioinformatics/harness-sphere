name: DeepSeek PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr diff "$PR_NUMBER" > pr.diff

      - name: Review with DeepSeek
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          set -uo pipefail
          # Guard against oversized diffs blowing the model's context (~4 chars/token).
          MAX_CHARS=60000
          DIFF=$(cat pr.diff)
          NOTE=""
          if [ "${#DIFF}" -gt "$MAX_CHARS" ]; then
            DIFF="${DIFF:0:$MAX_CHARS}"
            NOTE="> ⚠️ Diff truncated to ${MAX_CHARS} chars for review."
          fi
          PAYLOAD=$(jq -n \
            --arg diff "$DIFF" \
            '{
              model: "deepseek-reasoner",
              max_tokens: 8192,
              messages: [
                {
                  role: "system",
                  content: "You are a senior Rust engineer reviewing a pull request on HarnessSphere — a single-binary OpenTelemetry telemetry watcher built with hexagonal (ports & adapters) architecture: the domain crate has zero IO and zero opentelemetry dependencies; adapters provide the source collectors, the OTLP ingest receiver, and the exporters; the runtime is tokio. Focus on: correctness and safety; resilience (a monitored target must never crash the watcher — Critical sources, Host and Self, are fatal only on persistent failure, Optional sources must degrade and never bring the process down; panics inside collectors must be contained); hexagonal boundary violations (no opentelemetry/IO types leaking into the domain); OpenTelemetry semantic-convention correctness (metric, attribute and span names); error handling and graceful degradation; performance and footprint (the watcher must stay light); and config (serde/TOML) correctness. Be concise and direct. Format your response in Markdown with sections: **Summary**, **Issues** (blocking vs. advisory), **Suggestions**. Skip praise."
                },
                {
                  role: "user",
                  content: ("Review this PR diff:\n\n```diff\n" + $diff + "\n```")
                }
              ]
            }')

          HTTP=$(curl -sS -o resp.json -w '%{http_code}' \
            https://api.deepseek.com/v1/chat/completions \
            -H "Authorization: Bearer $DEEPSEEK_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || echo "000")

          if [ "$HTTP" != "200" ]; then
            REVIEW="_Automated review unavailable (DeepSeek API returned HTTP ${HTTP})._"
          else
            REVIEW=$(jq -r '.choices[0].message.content // "_DeepSeek returned no content._"' resp.json)
          fi

          {
            echo "## DeepSeek Code Review"
            echo ""
            if [ -n "$NOTE" ]; then echo "$NOTE"; echo ""; fi
            echo "$REVIEW"
          } > review_comment.md

      - name: Post review comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr comment "$PR_NUMBER" --body-file review_comment.md
