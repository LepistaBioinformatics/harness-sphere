name: Publish to crates.io

# Manually dispatched. Publishes the workspace crates to crates.io.
# Run this AFTER the GitHub Release for the version exists (so the downloadable binary
# is published first). Defaults to a dry run; set dry_run=false to actually publish.
#
# Requires the repository secret CARGO_REGISTRY_TOKEN (a crates.io API token).
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no real publish)"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  publish:
    name: cargo publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish workspace crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          # `cargo publish --workspace` packages and verifies every member in topological
          # order, resolving the inter-workspace deps locally (so an unpublished
          # harnesssphere-domain verifies fine), and waits for crates.io indexing between
          # crates on a real publish.
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            cargo publish --workspace --locked --dry-run
          else
            cargo publish --workspace --locked
          fi
